name: Bug Report
description: Report a defect in planner flows, data handling, or UI behavior.
title: '[Bug]: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the issue briefly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List exact steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      options:
        - Family Dashboard
        - Week View
        - Month View
        - Tests Center
        - Homework Center
        - Activities Center
        - Children Management
        - Documents Repository
        - Calendar View
        - Settings
        - Data Import
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device Type
      options:
        - Mobile
        - Tablet
        - Desktop
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 126, Safari 18

  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or Logs
      description: Paste screenshots, stack traces, or console output.
